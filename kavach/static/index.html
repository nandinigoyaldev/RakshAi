<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAVACH – Women Safety System</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7v7c0 5 3.8 9.74 9 11 5.2-1.26 9-6 9-11V7L12 2z" fill="#ff0040" />
      </svg>
      <span class="logo-text">KAVACH</span>
    </div>
    <div class="status-center" id="statusCenter">
      <span id="statusLabel" class="status-label">KAVACH ACTIVE</span>
      <span class="pulse-dot green" id="statusDot"></span>
    </div>
    <div class="right-info">
      <span id="timeDisplay"></span>
      <span class="pulse-dot" id="arduinoDot"></span>
    </div>
  </header>

  <!-- MAIN GRID -->
  <main class="grid-container">
    <!-- LEFT PANEL -->
    <section class="panel left-panel">
      <div class="camera-card">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlayCanvas"></canvas>
        <div class="camera-label">KAVACH VISION ACTIVE</div>
        <div class="posture-text" id="postureDesc"></div>
      </div>
      <div class="analysis-note">Analyzing body language every 3 seconds</div>
    </section>

    <!-- CENTER PANEL -->
    <section class="panel center-panel">
      <div class="meter" id="postureMeter">
        <svg viewBox="0 0 36 36" class="circular-chart">
          <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="circle" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" stroke-dasharray="0, 100" />
          <text x="18" y="20.35" class="percentage" id="posturePercent">0%</text>
        </svg>
        <div class="meter-label">POSTURE</div>
        <div class="meter-state" id="postureState">NORMAL</div>
      </div>
      <div class="meter" id="hrMeter">
        <svg viewBox="0 0 36 36" class="circular-chart">
          <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="circle" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" stroke-dasharray="0, 100" />
          <text x="18" y="20.35" class="percentage" id="hrPercent">0%</text>
        </svg>
        <div class="meter-label">HEART RATE</div>
        <div class="meter-state" id="hrState">NORMAL</div>
      </div>
      <div class="meter" id="motionMeter">
        <svg viewBox="0 0 36 36" class="circular-chart">
          <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="circle" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" stroke-dasharray="0, 100" />
          <text x="18" y="20.35" class="percentage" id="motionPercent">0%</text>
        </svg>
        <div class="meter-label">MOTION</div>
        <div class="meter-state" id="motionState">NORMAL</div>
      </div>
      <div class="layers-active" id="layersActive">0/3 LAYERS ACTIVE</div>
      <div class="bpm-display" id="bpmDisplay">BPM: —</div>
      <div class="motion-display" id="motionDisplay">Motion: —</div>
    </section>

    <!-- RIGHT PANEL -->
    <section class="panel right-panel">
      <div class="trigger-status" id="triggerStatus">ALL CLEAR — Monitoring Active</div>
      <div class="controls">
        <button class="btn btn-sos" id="manualSosBtn">MANUAL SOS</button>
        <button class="btn btn-fake" id="fakeCallBtn">FAKE CALL</button>
        <button class="btn btn-reset" id="resetAlertBtn">RESET ALERT</button>
      </div>
      <div class="contacts-section">
        <h3>Trusted Contacts</h3>
        <ul id="contactsList"></ul>
        <form id="addContactForm">
          <input type="text" id="contactName" placeholder="Name" required />
          <input type="tel" id="contactPhone" placeholder="+1234567890" required />
          <button type="submit" class="btn btn-add">Add</button>
        </form>
      </div>
    </section>
  </main>

  <!-- MODALS -->
  <div class="modal" id="sosCountdownModal">
    <div class="modal-content">
      <p>SOS IN <span id="countdownNumber">5</span>...</p>
      <button class="btn btn-cancel" id="cancelSosBtn">CANCEL</button>
    </div>
  </div>

  <div class="modal" id="fakeCallModal">
    <div class="modal-content call-screen">
      <div class="caller-name">Papa 📞</div>
      <div class="caller-subtitle">mobile</div>
      <div class="call-buttons">
        <button class="btn btn-accept">Accept</button>
        <button class="btn btn-decline">Decline</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
