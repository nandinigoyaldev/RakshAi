<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autobotx</title>
    <!-- Professional Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                <h1>autobot<span class="highlight">x</span></h1>
            </div>
            <div class="status-bar">
                <span id="api-status" class="badge">SYS: OFFLINE</span>
                <span id="camera-status" class="badge">CAM: OFFLINE</span>
                <span id="voice-status" class="badge">VOICE: OFFLINE</span>
                <a href="/about.html" target="_blank" class="btn outline small-btn">Manual</a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard">
            
            <!-- Left Side: Camera Feed -->
            <section class="video-section">
                <div class="video-wrapper">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="output_canvas"></canvas>
                </div>
            </section>
            
            <!-- Right Side: Clean Control Panel -->
            <section class="control-panel">
                <div class="card p-4 text-center">
                    <button id="initializeSystemButton" class="btn primary">
                        Initialize J.A.R.V.I.S.
                    </button>
                    <p class="hint mt-2">Say "Hey Jarvis" or show 5 fingers.</p>
                </div>

                <div class="card p-4">
                    <h3>Gesture Output</h3>
                    <div id="gesture-output" class="sign-result mt-2">
                        <span class="placeholder">Waiting for hand...</span>
                    </div>
                </div>

                <div class="card p-4">
                    <h3>Environment Scanner</h3>
                    <div id="object-output" class="notes-box mt-2" style="height: 100px;">
                        <p class="sys-msg">Initializing optics...</p>
                    </div>
                </div>

                <div class="card p-4 flex-grow">
                    <h3>Voice Assistant</h3>
                    <div id="voice-output" class="notes-box mt-2">
                        <p class="sys-msg">Waiting for voice...</p>
                    </div>
                </div>
            </section>
            
        </main>
        
        <!-- Hidden elements needed by JS -->
        <div style="display:none;">
            <span id="tracking-status">INACTIVE</span>
            <span id="handedness-out">-</span>
            <div id="notifications-box"></div>
        </div>
    </div>

    <script type="module" src="/app.js"></script>
</body>
</html>
