<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autobotx uchless kisosk</title>
    <!-- Professional Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="card">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                <h1>autobotx <span class="highlight">uchless kisosk</span></h1>
            </div>
            <div class="status-bar">
                <span id="api-status" class="badge">SYS: OFFLINE</span>
                <span id="camera-status" class="badge">CAM: OFFLINE</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard">
            <!-- Camera Feed -->
            <section class="video-section card">
                <div class="video-wrapper">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="output_canvas"></canvas>
                </div>
                <div class="controls">
                    <button id="enableWebcamButton" class="btn primary">
                        Enable Camera
                    </button>
                    <p class="hint">Show 5 fingers to activate holographic interface.</p>
                </div>
            </section>

            <!-- Features & Output -->
            <section class="sidebar">
                <div class="output-panel card">
                    <h2>Input Detection</h2>
                    <div id="gesture-output" class="sign-result">
                        <span class="placeholder">Waiting for hand...</span>
                    </div>
                </div>

                <div class="features-panel card">
                    <h2>System Telemetry</h2>
                    <ul id="features-list" class="feature-list">
                        <li>Tracking Status: <span id="tracking-status">INACTIVE</span></li>
                        <li>Handedness: <span id="handedness-out">-</span></li>
                    </ul>
                </div>

                <div class="notifications-panel card">
                    <h2>Recent Events</h2>
                    <div id="notifications-box" class="notes-box">
                        <p class="sys-msg">System initialized. Awaiting commands...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="/app.js"></script>
</body>
</html>
